name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install --no-package-lock

      # Build in dependency order (algorithms first — core and adapters depend on it)
      - name: Build algorithms
        run: cd packages/algorithms && npm run build
      - name: Build core
        run: cd packages/core && npm run build
      - name: Build adapter-postgres
        run: cd packages/adapters/postgres && npm run build
      - name: Build adapter-sqlite
        run: cd packages/adapters/sqlite && npm run build

      # Type-check (after build so cross-package imports resolve)
      - name: Lint algorithms
        run: cd packages/algorithms && npx tsc --noEmit
      - name: Lint core
        run: cd packages/core && npx tsc --noEmit
      - name: Lint adapter-postgres
        run: cd packages/adapters/postgres && npx tsc --noEmit
      - name: Lint adapter-sqlite
        run: cd packages/adapters/sqlite && npx tsc --noEmit

      # Test all packages
      - name: Test algorithms
        run: cd packages/algorithms && npx vitest run
      - name: Test core
        run: cd packages/core && npx vitest run
      - name: Test adapter-postgres
        run: cd packages/adapters/postgres && npx vitest run --passWithNoTests
      - name: Test adapter-sqlite
        run: cd packages/adapters/sqlite && npx vitest run --passWithNoTests

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm install
      - run: cd packages/algorithms && npm run build
      - run: cd packages/core && npm run build
      - name: Publish algorithms
        run: cd packages/algorithms && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish core
        run: cd packages/core && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
