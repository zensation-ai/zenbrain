name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm install --no-package-lock

      # Build in dependency order (algorithms first — core and adapters depend on it)
      - name: Build algorithms
        run: cd packages/algorithms && npm run build
      - name: Build core
        run: cd packages/core && npm run build
      - name: Build adapter-postgres
        run: cd packages/adapters/postgres && npm run build
      - name: Build adapter-sqlite
        run: cd packages/adapters/sqlite && npm run build

      # Type-check (after build so cross-package imports resolve)
      - name: Lint algorithms
        run: cd packages/algorithms && npx tsc --noEmit
      - name: Lint core
        run: cd packages/core && npx tsc --noEmit
      - name: Lint adapter-postgres
        run: cd packages/adapters/postgres && npx tsc --noEmit
      - name: Lint adapter-sqlite
        run: cd packages/adapters/sqlite && npx tsc --noEmit

      # Test all packages
      - name: Test algorithms
        run: cd packages/algorithms && npx vitest run
      - name: Test core
        run: cd packages/core && npx vitest run
      - name: Test adapter-postgres
        run: cd packages/adapters/postgres && npx vitest run --passWithNoTests
      - name: Test adapter-sqlite
        run: cd packages/adapters/sqlite && npx vitest run --passWithNoTests

      # Smoke-test the self-contained example so it cannot silently rot
      - name: Smoke-test example (basic-chatbot)
        run: npx tsx examples/basic-chatbot.ts

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 20 bundles npm 10.x.
      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@^11.5.1
      - run: npm install --no-package-lock
      # Build order matters: algorithms -> core -> adapters (each depends on the previous).
      - run: cd packages/algorithms && npm run build
      - run: cd packages/core && npm run build
      - run: cd packages/adapters/postgres && npm run build
      - run: cd packages/adapters/sqlite && npm run build
      # Auth is via OIDC trusted publishing configured on npmjs.com (no NPM_TOKEN);
      # provenance attestations are generated automatically.
      # Idempotent: only publish a version that is not already on the registry,
      # so re-tagging or a tag that touches only one package never fails.
      - name: Publish algorithms (skip if already published)
        run: |
          cd packages/algorithms
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@zensation/algorithms@$VERSION" version >/dev/null 2>&1; then
            echo "@zensation/algorithms@$VERSION already on npm — skipping"
          else
            npm publish --access public
          fi
      - name: Publish core (skip if already published)
        run: |
          cd packages/core
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@zensation/core@$VERSION" version >/dev/null 2>&1; then
            echo "@zensation/core@$VERSION already on npm — skipping"
          else
            npm publish --access public
          fi
      - name: Publish adapter-postgres (skip if already published)
        run: |
          cd packages/adapters/postgres
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@zensation/adapter-postgres@$VERSION" version >/dev/null 2>&1; then
            echo "@zensation/adapter-postgres@$VERSION already on npm — skipping"
          else
            npm publish --access public
          fi
      - name: Publish adapter-sqlite (skip if already published)
        run: |
          cd packages/adapters/sqlite
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@zensation/adapter-sqlite@$VERSION" version >/dev/null 2>&1; then
            echo "@zensation/adapter-sqlite@$VERSION already on npm — skipping"
          else
            npm publish --access public
          fi
