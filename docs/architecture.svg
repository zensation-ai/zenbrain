<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 720" width="800" height="720">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff" fill-opacity="0.4"/>
    </marker>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#12131f"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="720" rx="16" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="48" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="0.5">ZenBrain Memory Architecture</text>
  <text x="400" y="72" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.5">7-Layer Cognitive Memory System</text>

  <!-- Layer 7 (top) — Cross-Context Memory -->
  <g filter="url(#shadow)">
    <rect x="80" y="100" width="640" height="68" rx="12" fill="#f43f5e" fill-opacity="0.9"/>
    <rect x="80" y="100" width="640" height="68" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="110" y="128" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.7">LAYER 7</text>
    <text x="110" y="150" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#ffffff">Cross-Context Memory</text>
    <text x="690" y="140" text-anchor="end" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.75">Shared knowledge across domains</text>
  </g>

  <!-- Arrow 7→6 -->
  <line x1="400" y1="168" x2="400" y2="182" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Layer 6 — Core Memory -->
  <g filter="url(#shadow)">
    <rect x="80" y="186" width="640" height="68" rx="12" fill="#ec4899" fill-opacity="0.9"/>
    <rect x="80" y="186" width="640" height="68" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="110" y="214" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.7">LAYER 6</text>
    <text x="110" y="236" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#ffffff">Core Memory</text>
    <text x="690" y="226" text-anchor="end" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.75">Pinned facts (Letta-style)</text>
  </g>

  <!-- Arrow 6→5 -->
  <line x1="400" y1="254" x2="400" y2="268" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Layer 5 — Procedural Memory -->
  <g filter="url(#shadow)">
    <rect x="80" y="272" width="640" height="68" rx="12" fill="#d946ef" fill-opacity="0.9"/>
    <rect x="80" y="272" width="640" height="68" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="110" y="300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.7">LAYER 5</text>
    <text x="110" y="322" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#ffffff">Procedural Memory</text>
    <text x="690" y="312" text-anchor="end" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.75">How to do X (skills &amp; workflows)</text>
  </g>

  <!-- Arrow 5→4 -->
  <line x1="400" y1="340" x2="400" y2="354" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Layer 4 — Long-Term Semantic -->
  <g filter="url(#shadow)">
    <rect x="80" y="358" width="640" height="68" rx="12" fill="#a855f7" fill-opacity="0.9"/>
    <rect x="80" y="358" width="640" height="68" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="110" y="386" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.7">LAYER 4</text>
    <text x="110" y="408" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#ffffff">Long-Term Semantic</text>
    <text x="690" y="398" text-anchor="end" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.75">Facts with FSRS scheduling</text>
  </g>

  <!-- Arrow 4→3 -->
  <line x1="400" y1="426" x2="400" y2="440" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Layer 3 — Episodic Memory -->
  <g filter="url(#shadow)">
    <rect x="80" y="444" width="640" height="68" rx="12" fill="#8b5cf6" fill-opacity="0.9"/>
    <rect x="80" y="444" width="640" height="68" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="110" y="472" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.7">LAYER 3</text>
    <text x="110" y="494" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#ffffff">Episodic Memory</text>
    <text x="690" y="484" text-anchor="end" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.75">Concrete experiences &amp; events</text>
  </g>

  <!-- Arrow 3→2 -->
  <line x1="400" y1="512" x2="400" y2="526" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Layer 2 — Short-Term Memory -->
  <g filter="url(#shadow)">
    <rect x="80" y="530" width="640" height="68" rx="12" fill="#6366f1" fill-opacity="0.9"/>
    <rect x="80" y="530" width="640" height="68" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="110" y="558" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.7">LAYER 2</text>
    <text x="110" y="580" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#ffffff">Short-Term Memory</text>
    <text x="690" y="570" text-anchor="end" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.75">Current conversation context</text>
  </g>

  <!-- Arrow 2→1 -->
  <line x1="400" y1="598" x2="400" y2="612" stroke="#ffffff" stroke-opacity="0.3" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

  <!-- Layer 1 (bottom) — Working Memory -->
  <g filter="url(#shadow)">
    <rect x="80" y="616" width="640" height="68" rx="12" fill="#3b82f6" fill-opacity="0.9"/>
    <rect x="80" y="616" width="640" height="68" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1"/>
    <text x="110" y="644" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.7">LAYER 1</text>
    <text x="110" y="666" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#ffffff">Working Memory</text>
    <text x="690" y="656" text-anchor="end" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#ffffff" fill-opacity="0.75">Active task focus (7&#xB1;2 items)</text>
  </g>

  <!-- Consolidation flow label (right side) -->
  <text x="748" y="395" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.35" transform="rotate(-90 748 395)" letter-spacing="2">CONSOLIDATION FLOW</text>

  <!-- Right side consolidation arrow -->
  <line x1="738" y1="620" x2="738" y2="160" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Left side recall arrow -->
  <line x1="62" y1="160" x2="62" y2="620" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="52" y="395" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.35" transform="rotate(-90 52 395)" letter-spacing="2">RECALL PATH</text>

  <!-- Footer -->
  <text x="400" y="706" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#ffffff" fill-opacity="0.3">zensation.ai/zenbrain</text>
</svg>