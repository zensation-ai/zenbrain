    <line x1="0" y1="438" x2="1080" y2="438" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="24" y="476" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#e2e8f0">Context-Dependent Retrieval</text>
    <text x="440" y="478" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#22c55e">✓</text>
    <text x="640" y="478" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569">✗</text>
    <text x="840" y="478" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569">✗</text>
    <text x="1010" y="478" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569">✗</text>

    <!-- Row 8: TypeScript Native -->
