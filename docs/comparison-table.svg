    <text x="440" y="158" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#22c55e">✓</text>
    <text x="640" y="158" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569">✗</text>
    <text x="840" y="158" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569">✗</text>
    <text x="1010" y="158" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569">✗</text>

    <!-- Row 3: Hebbian Learning -->
    <rect x="0" y="182" width="1080" height="64" fill="rgba(255,255,255,0.02)"/>
