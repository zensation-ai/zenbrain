<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12132a"/>
      <stop offset="100%" style="stop-color:#1a1b2e"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <linearGradient id="zenCol" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(20,184,166,0.12)"/>
      <stop offset="100%" style="stop-color:rgba(20,184,166,0.04)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="819" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Title -->
  <text x="600" y="52" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="32" font-weight="700" fill="#f0fdfa" letter-spacing="-0.5">ZenBrain vs The Competition</text>
  <text x="600" y="82" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#94a3b8" letter-spacing="0.3">The deepest open-source memory system for AI agents</text>

  <!-- Table area -->
  <g transform="translate(60, 110)">
    <!-- Column positions: Feature=0, ZenBrain=340, Mem0=540, Letta=740, Zep=940 -->
    <!-- Column widths: Feature=340, others=200 each, total=1080 -->

    <!-- ZenBrain column highlight -->
    <rect x="340" y="0" width="200" height="690" rx="8" fill="url(#zenCol)"/>
    <rect x="340" y="0" width="200" height="690" rx="8" fill="none" stroke="rgba(20,184,166,0.2)" stroke-width="1"/>

    <!-- Header row background -->
    <rect x="0" y="0" width="1080" height="54" rx="8" fill="rgba(255,255,255,0.04)"/>
    <rect x="340" y="0" width="200" height="54" rx="0" fill="url(#headerGrad)"/>
    <!-- Round top corners of ZenBrain header -->
    <rect x="340" y="0" width="200" height="54" rx="8" fill="url(#headerGrad)"/>
    <rect x="340" y="8" width="200" height="46" fill="url(#headerGrad)"/>

    <!-- Header text -->
    <text x="170" y="33" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#64748b" letter-spacing="1.5">FEATURE</text>
    <text x="440" y="33" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#ffffff" filter="url(#glow)">🧠 ZenBrain</text>
    <text x="640" y="33" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#94a3b8">Mem0</text>
    <text x="840" y="33" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#94a3b8">Letta</text>
    <text x="1010" y="33" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#94a3b8">Zep</text>

    <!-- Row template: y starts at 54, each row is 64px -->
    <!-- Row 1: Memory Layers -->
    <rect x="0" y="54" width="1080" height="64" fill="rgba(255,255,255,0.02)"/>
    <line x1="0" y1="54" x2="1080" y2="54" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="24" y="92" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#e2e8f0">Memory Layers</text>
    <text x="440" y="92" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#14b8a6">7</text>
    <text x="640" y="92" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#64748b">2</text>
    <text x="840" y="92" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#64748b">3</text>
    <text x="1010" y="92" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#64748b">2</text>

