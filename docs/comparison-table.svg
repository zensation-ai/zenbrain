    <line x1="0" y1="502" x2="1080" y2="502" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="24" y="540" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#e2e8f0">TypeScript Native</text>
    <text x="440" y="542" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#22c55e">✓</text>
    <text x="640" y="542" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#22c55e">✓</text>
    <text x="840" y="542" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569">✗</text>
    <text x="1010" y="542" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569">✗</text>

    <!-- Row 9: Zero Dependencies -->
    <rect x="0" y="566" width="1080" height="64" fill="rgba(255,255,255,0.02)"/>
    <line x1="0" y1="566" x2="1080" y2="566" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="24" y="604" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#e2e8f0">Zero Dependencies</text>
    <text x="440" y="606" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#22c55e">✓</text>
    <text x="640" y="606" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569">✗</text>
    <text x="840" y="606" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569">✗</text>
    <text x="1010" y="606" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#475569">✗</text>

    <!-- Row 10: Self-Hosted -->
    <rect x="0" y="630" width="1080" height="60" fill="transparent"/>
    <line x1="0" y1="630" x2="1080" y2="630" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    <text x="24" y="666" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="500" fill="#e2e8f0">Self-Hosted</text>
    <text x="440" y="668" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#22c55e">✓</text>
    <text x="640" y="668" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#22c55e">✓</text>
    <text x="840" y="668" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#22c55e">✓</text>
    <text x="1010" y="668" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="20" fill="#22c55e">✓</text>

    <!-- Bottom line -->
    <line x1="0" y1="690" x2="1080" y2="690" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  </g>

  <!-- Footer -->
  <text x="600" y="795" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">github.com/zensation-ai/zenbrain  ·  MIT License  ·  npm install @zensation/algorithms</text>
</svg>